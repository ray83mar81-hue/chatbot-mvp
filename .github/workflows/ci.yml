# Continuous Integration: lint + smoke tests on every push and PR.
# Catches the class of bugs that have shipped to staging unreviewed
# (NameError from a missing import, broken translation source resolution,
# etc.). See docs/chatbot-mvp-lessons.md → P19 / P21 / R13.
#
# This workflow does NOT block deploys today (Easypanel deploys directly
# from the repo). Treat the red ❌ on a commit as a manual stop signal:
# do not redeploy a commit whose CI is red.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pin ruff to avoid surprise rule changes between versions.
      # Bump intentionally when we want to adopt new checks.
      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: Lint
        run: ruff check .

  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Tests use SQLite — never touch a real database, never need a real
      # JWT secret. These also short-circuit pydantic-settings which would
      # otherwise default DATABASE_URL to PostgreSQL and require psycopg2.
      DATABASE_URL: "sqlite:///./test.db"
      JWT_SECRET: "test-secret-not-used-in-prod"
      AI_KEY_ENCRYPTION_SECRET: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -q --tb=short
